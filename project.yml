name: MacClean
options:
  bundleIdPrefix: com.macclean
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  postGenCommand: open .

settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  SWIFT_STRICT_CONCURRENCY: complete
  CODE_SIGN_STYLE: Automatic
  CODE_SIGN_IDENTITY: "-"
  DEVELOPMENT_TEAM: ""

targets:
  MacClean:
    type: application
    platform: macOS
    sources:
      - path: MacClean
    resources:
      - path: MacClean/Resources/AppIcon.icns
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.macclean.app
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_LSUIElement: "NO"
      INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 MacClean"
      INFOPLIST_KEY_CFBundleShortVersionString: "1.0.0"
      INFOPLIST_KEY_CFBundleVersion: "1"
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_ENTITLEMENTS: MacClean/MacClean.entitlements
      SWIFT_VERSION: "6.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies: []
    info:
      path: MacClean/Info.plist
      properties:
        CFBundleName: MacClean
        CFBundleDisplayName: MacClean
        CFBundlePackageType: APPL
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true

  HelperTool:
    type: tool
    platform: macOS
    sources:
      - path: HelperTool
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.macclean.helper
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_CFBundleShortVersionString: "1.0.0"
      INFOPLIST_KEY_CFBundleVersion: "1"
      CODE_SIGN_ENTITLEMENTS: HelperTool/HelperTool.entitlements
      ENABLE_HARDENED_RUNTIME: true
      SWIFT_VERSION: "6.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
      MACH_O_TYPE: mh_execute
      SKIP_INSTALL: true
      INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/LaunchServices"
      WRAPPER_EXTENSION: ""
    info:
      path: HelperTool/Info.plist
      properties:
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        SMLoginItem: true
